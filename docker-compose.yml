services:
  backend:
    build: ./backend
    container_name: flask_backend
    environment:
      DB_HOST: devopsdb.c9coiamscw0s.ap-south-1.rds.amazonaws.com
      DB_USER: appuser
      DB_PASSWORD: apppass1234
      DB_NAME: appdb
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: nginx_frontend
    depends_on:
      - backend
    ports:
      - "80:80"
