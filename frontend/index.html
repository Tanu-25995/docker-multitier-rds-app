<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Multi-Tier Docker + RDS</title>
</head>
<body>
  <h1>✅ Multi-Tier App (Frontend + Backend + RDS)</h1>

  <div>
    <input id="studentName" type="text" placeholder="Enter student name" />
    <button onclick="addStudent()">Add Student</button>
    <button onclick="loadStudents()">Load Students</button>
  </div>

  <h3>Students</h3>
  <div id="list"></div>

  <pre id="out"></pre>

  <script>
    async function loadStudents() {
      const res = await fetch('/api/students');
      const data = await res.json();

      // show raw JSON too
      document.getElementById('out').textContent = JSON.stringify(data, null, 2);

      // build list with Update/Delete buttons
      const list = document.getElementById('list');
      list.innerHTML = "";

      data.forEach(s => {
        const row = document.createElement("div");
        row.style.margin = "6px 0";

        row.innerHTML = `
          <b>${s.id}</b> - 
          <input id="name-${s.id}" value="${s.name}" />
          <button onclick="updateStudent(${s.id})">Update</button>
          <button onclick="deleteStudent(${s.id})">Delete</button>
        `;

        list.appendChild(row);
      });
    }

    async function addStudent() {
      const name = document.getElementById('studentName').value.trim();
      if (!name) {
        alert("Please enter a name");
        return;
      }

      const res = await fetch('/api/students', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });

      if (!res.ok) {
        const err = await res.text();
        alert("Error: " + err);
        return;
      }

      document.getElementById('studentName').value = "";
      await loadStudents();
    }

    async function updateStudent(id) {
      const name = document.getElementById(`name-${id}`).value.trim();
      if (!name) {
        alert("Name cannot be empty");
        return;
      }

      const res = await fetch(`/api/students/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });

      if (!res.ok) {
        const err = await res.text();
        alert("Error: " + err);
        return;
      }

      await loadStudents();
    }

    async function deleteStudent(id) {
      if (!confirm(`Delete student ${id}?`)) return;

      const res = await fetch(`/api/students/${id}`, { method: 'DELETE' });

      if (!res.ok) {
        const err = await res.text();
        alert("Error: " + err);
        return;
      }

      await loadStudents();
    }

    // auto load on page open
    loadStudents();
  </script>
</body>
</html>
